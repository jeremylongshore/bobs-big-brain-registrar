name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: 'ci-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          # Codecov needs the full history to attribute coverage to commits.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Put workspace bins on PATH (qmd for integration tests)
        # qmd is a pinned root devDependency (@tobilu/qmd). Using the workspace
        # bin makes HAS_QMD=true so the describe.skipIf(!HAS_QMD) integration
        # suites run (qmd-adapter e3q proof + git-exporter→qmd citation), AND
        # keeps a single source of truth for the qmd version in package.json so
        # Dependabot auto-bumps it via gated PRs. Beads 8md + this one.
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Verify qmd on PATH
        run: qmd --version

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Architecture rules (dependency-cruiser)
        run: pnpm depcruise

      - name: Complexity gate (CRAP / Wall 5)
        run: pnpm crap

      - name: Policy-artifact hash pin (harness-pin --verify)
        run: pnpm harness-pin

      - name: Test (with coverage)
        # Switched from pnpm test:ci to pnpm test:coverage so coverage/lcov.info
        # is produced for the Codecov upload step below. test:coverage runs the
        # same test set (incl. the eval-surface provenance-integrity unit tests);
        # only the coverage instrumentation is added.
        run: pnpm test:coverage

      - name: Provenance-integrity eval (real on-disk brain, forks pass / tamper fails)
        # A REAL end-to-end run of evaluateProvenanceIntegrity against a seeded
        # throwaway brain carrying a benign CHAIN_FORK. Named gate for
        # 010-AT-RISK R5 / bead compile-then-govern-e06.2: proves the eval passes
        # on a forked-but-untampered chain (the live brain's shape: 155 forks,
        # 0 tamper) while still failing closed on genuine tampering. Complements
        # the in-memory unit tests above with a real-DB regression guard.
        run: pnpm --filter @qmd-team-intent-kb/eval-surface provenance:ci

      - name: Govern-decision eval (per-check precision/recall, fail-closed on missed secret/PII)
        # 010-AT-RISK R5/R10 · bead compile-then-govern-e06.3: runs the govern
        # decision over the versioned adversarial labeled set (dataset/v1) and
        # prints PER-CHECK precision/recall + the false-negative list. Fails
        # CLOSED on any UNDOCUMENTED false-negative — a missed secret/PII the
        # dataset did not already flag as a known, tracked gap (i.e. a regression
        # or a new evasion). Documented gaps (split keys, base64, boundary blind
        # spots) are reported, not failed. Determinism is not efficacy; this gate
        # makes the moat's catch-rate a required, measured property.
        run: pnpm --filter @qmd-team-intent-kb/eval-surface govern:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          # Dependabot PRs run with secrets withheld (empty CODECOV_TOKEN), so a
          # token-less upload errors. Keep the strict gate for human PRs; soft-fail
          # only for dependabot so dependency-update PRs aren't blocked by it.
          fail_ci_if_error: ${{ github.actor != 'dependabot[bot]' }}
          verbose: true

      - name: Upload test results to Codecov Test Analytics
        # JUnit XML produced by vitest's junit reporter (see vitest.config.ts).
        # Codecov Test Analytics gives flaky-test detection + slow-test
        # ranking + failure trends — surfaced in the PR comment alongside
        # the coverage delta. Always runs so failed test runs still report.
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./test-results.junit.xml
          fail_ci_if_error: false

      - name: Upload test results (artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: coverage/
          retention-days: 14

  integration:
    # L4 integration tests via testcontainers. Pulls real Docker images
    # (~50MB postgres:16-alpine for now). Slower than the validate job;
    # runs only on:
    #   - push to main / develop (full belt-and-suspenders)
    #   - pull_request with the 'integration' label (opt-in for PRs that
    #     touch L4 surfaces — store schema, future postgres backend,
    #     container-based dependencies)
    # Tracked in qmd-team-intent-kb-oqd. Triggers documented in
    # tests/TESTING.md §"Integration tests (L4)".
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'integration')
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Verify Docker available
        run: docker version

      - name: Build workspace (integration tests import compiled workspace packages)
        run: pnpm build

      - name: Integration tests (testcontainers / L4)
        run: pnpm test:integration
