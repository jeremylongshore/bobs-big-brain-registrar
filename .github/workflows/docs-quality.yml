name: Docs Quality

# Quality gates for the docs corpus.
# Four tools in this workflow:
#   1. markdownlint-cli2 — markdown linting
#   2. Vale              — prose linting (built-in ruleset + IS vocab)
#   3. lychee            — broken-link checking
#   4. frontmatter validator (scripts/validate-frontmatter.py) — YAML frontmatter schema check
#
# All four are BLOCKING on PRs. Conservative rulesets so the existing corpus passes.
# Tighten over time by editing the per-tool config files at repo root.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Invoke markdownlint-cli2 directly rather than via the
      # DavidAnson/markdownlint-cli2-action@v17 wrapper. The action's
      # `globs:` input layers a default `*.{md,markdown}` on top of the
      # config's globs (picking up legacy root docs we haven't curated),
      # and the workaround of passing `globs: ' '` was undocumented and
      # fragile across action versions. Calling the CLI directly with no
      # `globs` argument means the config's globs are the only source of
      # truth.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Run markdownlint-cli2
        run: npx -y markdownlint-cli2

  vale:
    name: Vale prose lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Vale
        uses: errata-ai/vale-action@reviewdog
        with:
          version: 3.9.1
          # Scoping lives in .vale.ini per-directory sections, not here —
          # the action's `files:` input only accepts a single path and we
          # need to scan 000-docs + CLAUDE.md + README.md. The .vale.ini
          # default `[*.md] BasedOnStyles =` (empty) suppresses linting
          # for unscoped paths; per-dir sections opt back in.
          fail_on_error: true
          filter_mode: nofilter
          reporter: github-check
          vale_flags: '--minAlertLevel=warning'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lychee:
    name: lychee link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # lychee REQUIRES at least one positional input. Pass `.` and let
          # `.lychee.toml`'s `include`/`exclude_path` do the actual filtering.
          # An earlier attempt passed `'**/*.md'` as the input, but the
          # action's shell doesn't expand globs and lychee then tries to
          # parse it as a regex (which fails on the `**` operator).
          args: --config .lychee.toml --no-progress .
          fail: true
          format: markdown
          output: ./lychee-report.md

  frontmatter:
    name: Frontmatter validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate frontmatter
        run: python3 scripts/validate-frontmatter.py
