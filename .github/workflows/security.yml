name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Dependency / lockfile checks only run when deps change OR on main pushes.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'dependencies')
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: npm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Lockfile integrity
        run: |
          pnpm install --frozen-lockfile --ignore-scripts 2>&1
          if [ $? -ne 0 ]; then
            echo "::error::Lockfile out of sync with package.json"
            exit 1
          fi

  gitleaks:
    # Real secret scanner — replaces the prior homegrown git-grep regex.
    # Runs on EVERY PR (not just dep-touching ones), because secrets can land
    # in any file. gitleaks ships hundreds of curated provider rules.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v7

      - name: Semgrep SAST scan
        run: semgrep scan --config auto --error --json --output semgrep-results.json .
        continue-on-error: true

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 14
