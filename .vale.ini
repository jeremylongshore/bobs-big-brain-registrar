; Vale config — minimum viable prose linter for IS repos.
; v1 uses built-in Vale rules only. Tighten over time by adding StylesPath packages
; (Microsoft, Google, write-good) once the existing doc corpus passes the basic set.

StylesPath = .vale/styles
MinAlertLevel = warning

Vocab = Intent

[*.md]
BasedOnStyles = Vale

; Ignore code blocks, inline code, links, and frontmatter.
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (\$+[^\n$]+\$+)

[000-docs/*.md]
; Stricter on the docs corpus once baseline cleanup is done.
BasedOnStyles = Vale

[CHANGELOG.md]
; Changelogs have lots of repetition; don't enforce style.
BasedOnStyles =
