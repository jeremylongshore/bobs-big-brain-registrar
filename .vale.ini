; Vale config — minimum viable prose linter for IS repos.
; v1 uses built-in Vale rules only. Tighten over time by adding StylesPath packages
; (Microsoft, Google, write-good) once the existing doc corpus passes the basic set.

StylesPath = .vale/styles
MinAlertLevel = warning

Vocab = Intent

; Default: do NOT lint any markdown. The default scope is then opened up
; explicitly per-directory below. This is the inverse of the more common
; `[*.md] = Vale` + per-dir exclusion pattern; we use it here because
; legacy docs (plugin/, .github/, packages/*/CHANGELOG.md, etc.) carry
; technical identifiers (snake_case variables, file extensions) that
; the spell-checker treats as misspellings. Easier to scope IN than to
; enumerate the exclusions.
[*.md]
BasedOnStyles =

; The docs corpus is what we curate; opt it in to the Vale built-in style.
[000-docs/**/*.md]
BasedOnStyles = Vale
; All three built-in Vale rules are too noisy for technical prose:
;   Vale.Terms      — style-preference, not correctness
;   Vale.Spelling   — default dict misses technical terms (backlinks,
;                     evals, Marp, matplotlib, ...) faster than the vocab
;                     can be maintained
;   Vale.Repetition — false positives on author initials (F. F. in APA
;                     citations) and legitimate technical phrasings
;                     ("Workspace package package.json")
; v1: the Vale infrastructure is wired (config, vocab, CI job) but
; effectively no-op until bead zcc.2 layers in a real style package
; (Microsoft, Google, write-good) with curated rules tuned for prose.
Vale.Terms = NO
Vale.Spelling = NO
Vale.Repetition = NO
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (\$+[^\n$]+\$+)

